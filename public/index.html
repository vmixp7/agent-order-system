<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訂單助理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .5px; }

    #btn-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      transition: background .2s;
    }
    #btn-reset:hover { background: rgba(255,255,255,.12); }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 780px;
      overflow-y: auto;
      padding: 24px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: .95rem;
    }

    .bubble.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.agent {
      align-self: flex-start;
      background: #fff;
      color: #222;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    .bubble.error {
      align-self: flex-start;
      background: #fde8e8;
      color: #b91c1c;
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #fff;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    .typing span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #form-area {
      width: 100%;
      max-width: 780px;
      padding: 12px 16px 20px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: .95rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color .2s;
    }
    #input:focus { border-color: #1a73e8; }

    #btn-send {
      padding: 12px 22px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      align-self: flex-end;
    }
    #btn-send:hover { background: #1558b0; }
    #btn-send:disabled { opacity: .5; cursor: default; }

    .empty-hint {
      align-self: center;
      color: #999;
      font-size: .9rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>訂單管理助理</h1>
  <button id="btn-reset">重新開始</button>
</header>

<div id="chat">
  <p class="empty-hint">請在下方輸入您的問題，例如：訂單 ORD-1001 目前狀態？</p>
</div>

<div id="form-area">
  <textarea id="input" rows="1" placeholder="輸入問題…（Shift+Enter 換行）"></textarea>
  <button id="btn-send">送出</button>
</div>

<script>
  const chat    = document.getElementById("chat");
  const input   = document.getElementById("input");
  const btnSend = document.getElementById("btn-send");
  const btnReset = document.getElementById("btn-reset");

  let loading = false;

  function appendBubble(text, type) {
    const div = document.createElement("div");
    div.className = "bubble " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "typing";
    el.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return el;
  }

  function clearHint() {
    const hint = chat.querySelector(".empty-hint");
    if (hint) hint.remove();
  }

  async function send() {
    const text = input.value.trim();
    if (!text || loading) return;

    clearHint();
    loading = true;
    btnSend.disabled = true;
    input.value = "";
    input.style.height = "auto";

    appendBubble(text, "user");
    const typingEl = showTyping();

    try {
      const res = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: text }),
      });
      const data = await res.json();
      typingEl.remove();

      if (!res.ok || data.error) {
        appendBubble(data.error ?? "發生未知錯誤", "error");
      } else {
        appendBubble(data.answer, "agent");
      }
    } catch (err) {
      typingEl.remove();
      appendBubble("網路錯誤，請稍後再試", "error");
    }

    loading = false;
    btnSend.disabled = false;
    input.focus();
  }

  btnSend.addEventListener("click", send);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });

  btnReset.addEventListener("click", async () => {
    await fetch("/api/reset", { method: "POST" });
    chat.innerHTML = '<p class="empty-hint">對話已重置，請輸入新問題。</p>';
  });
</script>

</body>
</html>
